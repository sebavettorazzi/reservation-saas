services:
  db:
    image: postgres:16-alpine
    container_name: reservation-saas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservation_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reservation_saas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
